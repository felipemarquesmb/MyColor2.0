<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Código</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

<div class="login-container">
<div class="login-box">

<h2 class="titulo">
Acabamos de enviar um código<br>
para o seu e-mail
</h2>

<p class="descricao">
Digite o código de 5 dígitos abaixo
</p>

<div class="codigo-container">
<input 
type="text" 
placeholder="Digite o código" 
maxlength="5" 
pattern="\d{5}" 
inputmode="numeric"
required
>
</div>

<form action="nova-senha.html">
<button class="btn">Enviar</button>
</form>

</div>
</div>

</body>
</html>
