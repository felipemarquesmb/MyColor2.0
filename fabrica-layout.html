<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fábrica de Layouts - MyColor</title>
<link rel="stylesheet" href="css/style.css">
<style>

body {
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    color: #e0e1dd;
}

.container { max-width: 1280px; margin: 0 auto; padding: 2rem; }



</style>
</head>

<body>

<header class="topo">
    <div class="logo-area">
        <div class="logo-icon"></div>
        <h2 class="logo">MyColor</h2>
    </div>

    <nav class="menu">
        <a href="index.html">Paletas</a>
        <a href="fabrica-layout.html" class="ativo">Fábrica de layouts</a>
    </nav>

    <a href="#" class="menu-icon" onclick="logout()">X</a>
</header>

<main class="container">
    <h2>Fábrica de Layouts</h2>

    <div class="painel-topo">
        <div class="box">
            <p>Paleta selecionada</p>
            <div class="paleta-fixa" id="paletaAtual"></div>
        </div>

        <div class="box">
            <p>Tipo de Layout</p>
            <div class="botoes-tipo">
                <button id="btn-app" class="ativo" onclick="mudarLayout('app')">App</button>
                <button id="btn-site" onclick="mudarLayout('site')">Site</button>
            </div>
        </div>
    </div>

    
    <div class="minhas-paletas">
        <h3>Minhas Paletas Salvas (máx. 3)</h3>
        <div class="paletas-salvas-container" id="paletasSalvasContainer"></div>
    </div>

    <div class="preview" id="previewContainer">
        <div class="preview-header">
            <div class="logo-mini"></div>
            <div class="menu-mini"></div>
        </div>
        <div class="preview-body app" id="previewBody"></div>
        <div class="preview-footer">
            <div class="btn-mini"></div>
        </div>
    </div>

    <div class="acao">
        <button class="btn-aplicar" onclick="abrirModalLayout()">Aplicar layout</button>
    </div>
</main>


<div class="modal-layout" id="modalLayout">
    <div class="modal-content-layout">
        <span class="fechar-modal-layout" onclick="fecharModalLayout()">✖</span>

        <div class="modal-header">
            <h2>Personalizar Layout</h2>
        </div>

        <div style="display: flex; gap: 24px;">
            <div class="layout-preview" id="layoutPreviewModal">
                <div class="layout-header">
                    <div class="logo-area-header">
                        <div class="logo-quadrado" data-id="logo" onclick="selecionarElemento(this)">MC</div>
                        <div class="logo-texto" data-id="logo-texto" onclick="selecionarElemento(this)">MyColor</div>
                    </div>
                    <div class="menu-mini" data-id="menu" onclick="selecionarElemento(this)">
                        <div></div><div></div><div></div>
                    </div>
                </div>

                
                <div id="modalLayoutBody" class="layout-body"></div>
            </div>

            
            <div class="paleta-lateral">
                <h4>Paleta Atual</h4>
                <div id="paletaModal"></div>
            </div>
        </div>

        <div style="text-align:center; margin-top: 24px; color:#94a3b8; font-size:14px;">
            Clique em uma área do layout → Depois clique em uma cor
        </div>
    </div>
</div>

<script>
let paletaAtual = ["#1e2937", "#334155", "#475569", "#64748b", "#94a3b8", "#e0e1dd", "#3a86ff"];
let elementoSelecionado = null;
let paletasSalvas = [];
let layoutAtual = 'app';

function carregarPaletasSalvas() {
    const salvas = localStorage.getItem("paletasSalvas");
    if (salvas) paletasSalvas = JSON.parse(salvas);
    renderizarPaletasSalvas();
}

function salvarPaleta() {
    if (paletasSalvas.length >= 3) {
        alert("Você já atingiu o máximo de 3 paletas salvas.");
        return;
    }
    const nome = prompt("Nome da paleta:", `Paleta ${paletasSalvas.length + 1}`);
    if (!nome) return;
    paletasSalvas.push({ nome: nome, cores: [...paletaAtual] });
    localStorage.setItem("paletasSalvas", JSON.stringify(paletasSalvas));
    renderizarPaletasSalvas();
}

function removerPaleta(index) {
    if (confirm("Remover esta paleta?")) {
        paletasSalvas.splice(index, 1);
        localStorage.setItem("paletasSalvas", JSON.stringify(paletasSalvas));
        renderizarPaletasSalvas();
    }
}

function selecionarPaletaSalva(index) {
    paletaAtual = [...paletasSalvas[index].cores];
    atualizarPaletaVisual();
    alert(`✅ Paleta "${paletasSalvas[index].nome}" carregada!`);
}

function renderizarPaletasSalvas() {
    const container = document.getElementById("paletasSalvasContainer");
    container.innerHTML = "";

    paletasSalvas.forEach((paleta, index) => {
        const card = document.createElement("div");
        card.className = "paleta-salva-card";
        card.innerHTML = `
            <div class="delete-btn" onclick="event.stopImmediatePropagation(); removerPaleta(${index})">×</div>
            <div class="paleta-mini">
                ${paleta.cores.slice(0,5).map(cor => `<span style="background:${cor}"></span>`).join('')}
            </div>
            <p>${paleta.nome}</p>
        `;
        card.onclick = () => selecionarPaletaSalva(index);
        container.appendChild(card);
    });

    if (paletasSalvas.length < 3) {
        const addBtn = document.createElement("div");
        addBtn.className = "paleta-salva-card";
        addBtn.style.border = "2px dashed #64748b";
        addBtn.style.display = "flex";
        addBtn.style.alignItems = "center";
        addBtn.style.justifyContent = "center";
        addBtn.style.color = "#64748b";
        addBtn.innerHTML = `<strong>+ Salvar Atual</strong>`;
        addBtn.onclick = salvarPaleta;
        container.appendChild(addBtn);
    }
}

function atualizarPaletaVisual() {
    const container = document.getElementById("paletaAtual");
    container.innerHTML = "";
    paletaAtual.forEach(cor => {
        const span = document.createElement("span");
        span.style.background = cor;
        span.style.width = "48px";
        span.style.height = "48px";
        span.style.borderRadius = "8px";
        span.style.marginRight = "8px";
        span.onclick = () => copiarCor(cor);
        container.appendChild(span);
    });
}

function abrirModalLayout() {
    document.getElementById("modalLayout").style.display = "flex";
    carregarPaletaNoModal();
    atualizarModalLayoutBody(); 
}

function carregarPaletaNoModal() {
    const container = document.getElementById("paletaModal");
    container.innerHTML = "";
    paletaAtual.forEach(cor => {
        const span = document.createElement("span");
        span.style.background = cor;
        span.onclick = () => aplicarCor(cor);
        container.appendChild(span);
    });
}

function selecionarElemento(el) {
    document.querySelectorAll('.layout-preview *').forEach(e => e.classList.remove('selecionado'));
    el.classList.add('selecionado');
    elementoSelecionado = el;
}

function aplicarCor(cor) {
    if (!elementoSelecionado) {
        alert("Selecione primeiro uma área do layout.");
        return;
    }
    elementoSelecionado.style.backgroundColor = cor;
}

function fecharModalLayout() {
    document.getElementById("modalLayout").style.display = "none";
    elementoSelecionado = null;
}

function copiarCor(cor) {
    navigator.clipboard.writeText(cor).then(() => alert("✅ Cor copiada: " + cor));
}

function logout(){
    localStorage.removeItem("usuarioLogado");
    window.location.href = "login.html";
}

function mudarLayout(tipo) {
    layoutAtual = tipo;
    
    document.querySelectorAll('.botoes-tipo button').forEach(btn => {
        btn.classList.toggle('ativo', btn.id === `btn-${tipo}`);
    });

    const previewBody = document.getElementById("previewBody");
    previewBody.className = `preview-body ${tipo}`;

    if (tipo === 'app') {
        previewBody.innerHTML = `
            <div style="background:#2a2a3e; padding:12px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="width:48px; height:28px; background:#3a86ff; border-radius:6px;"></div>
                <div style="width:110px; height:8px; background:#64748b; border-radius:9999px;"></div>
            </div>
            <div style="display:flex; gap:14px; margin-bottom:24px;">
                <div class="card-mini" style="flex:1; height:92px; background:#1e2937;"></div>
                <div class="card-mini" style="flex:1; height:92px; background:#1e2937;"></div>
            </div>
            <div style="display:flex; gap:12px; justify-content:center; margin-bottom:28px;">
                <div style="width:11px; height:11px; background:#64748b; border-radius:50%;"></div>
                <div style="width:11px; height:11px; background:#64748b; border-radius:50%;"></div>
                <div style="width:11px; height:11px; background:#64748b; border-radius:50%;"></div>
                <div style="width:11px; height:11px; background:#64748b; border-radius:50%;"></div>
            </div>
            <div class="card-mini" style="height:58px; margin-bottom:16px; background:#1e2937;"></div>
            <div class="card-mini" style="height:58px; margin-bottom:16px; background:#1e2937;"></div>
            <div class="card-mini" style="height:38px; width:65%; margin:0 auto; background:#1e2937;"></div>
        `;
    } else if (tipo === 'site') {
        previewBody.innerHTML = `
            <div style="background:#1e2937; height: 120px; border-radius: 12px; margin-bottom: 20px;"></div>
            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
                <div class="card-mini" style="height: 180px; background:#334155;"></div>
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <div class="card-mini" style="height: 80px; background:#475569;"></div>
                    <div class="card-mini" style="height: 80px; background:#475569;"></div>
                </div>
            </div>
            <div class="card-mini" style="height: 90px; margin-top: 20px; background:#1e2937;"></div>
        `;
    } else {
        previewBody.innerHTML = `<div class="card-mini" style="height:180px; background:#1e2937;"></div>`;
    }
}

function atualizarModalLayoutBody() {
    const body = document.getElementById("modalLayoutBody");
    body.innerHTML = "";

    if (layoutAtual === 'app') {
        body.innerHTML = `
            <div class="layout-body" style="flex-direction: column; gap: 18px; background:#1a1a2e; padding:16px; border-radius:12px;">
                <div data-id="barra-superior" onclick="selecionarElemento(this)" style="background:#3a86ff; height: 32px; border-radius: 9999px; margin-bottom: 18px; width: 65%; margin-left: auto; margin-right: auto;"></div>
                <div style="display: flex; gap: 14px; align-items: center;">
                    <div class="card-principal" data-id="principal" onclick="selecionarElemento(this)" style="flex: 1; height: 110px;"><strong>Card Principal (Destaque)</strong></div>
                    <div class="card-secundario" data-id="secundario" onclick="selecionarElemento(this)" style="flex: 1; height: 110px;"><strong>Card Secundário</strong></div>
                    <div data-id="seta-direita" onclick="selecionarElemento(this)" style="width: 32px; height: 32px; background: #64748b; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; flex-shrink: 0;">›</div>
                </div>
                <div style="display: flex; gap: 10px; justify-content: center; margin: 12px 0;">
                    <div data-id="dot1" onclick="selecionarElemento(this)" style="width: 11px; height: 11px; background: #64748b; border-radius: 50%;"></div>
                    <div data-id="dot2" onclick="selecionarElemento(this)" style="width: 11px; height: 11px; background: #64748b; border-radius: 50%;"></div>
                    <div data-id="dot3" onclick="selecionarElemento(this)" style="width: 11px; height: 11px; background: #64748b; border-radius: 50%;"></div>
                    <div data-id="dot4" onclick="selecionarElemento(this)" style="width: 11px; height: 11px; background: #64748b; border-radius: 50%;"></div>
                </div>
                <div class="info-adicional" data-id="info1" onclick="selecionarElemento(this)" style="height: 68px;"><strong>Informações Adicionais / Detalhes</strong></div>
                <div class="info-adicional" data-id="info2" onclick="selecionarElemento(this)" style="height: 68px;"><strong>Informações Adicionais / Detalhes</strong></div>
                <div data-id="barra-inferior" onclick="selecionarElemento(this)" style="background:#3a86ff; height: 32px; border-radius: 9999px; width: 45%; margin: 0 auto;"></div>
            </div>
        `;
    } else if (layoutAtual === 'site') {
        body.innerHTML = `
            <div class="layout-body" style="flex-direction: column; gap: 20px; background:#1a1a2e; padding:20px; border-radius:12px;">
                <div data-id="hero-banner" onclick="selecionarElemento(this)" style="height: 160px; background: linear-gradient(90deg, #3a86ff, #6366f1); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px;">
                    <strong>Banner Principal / Hero</strong>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                    <div class="card-principal" data-id="principal1" onclick="selecionarElemento(this)" style="height: 140px;"><strong>Card 1</strong></div>
                    <div class="card-principal" data-id="principal2" onclick="selecionarElemento(this)" style="height: 140px;"><strong>Card 2</strong></div>
                    <div class="card-principal" data-id="principal3" onclick="selecionarElemento(this)" style="height: 140px;"><strong>Card 3</strong></div>
                </div>
                <div class="info-adicional" data-id="info-principal" onclick="selecionarElemento(this)" style="height: 110px;"><strong>Conteúdo Principal / Seção Grande</strong></div>
                <div class="botoes-acao" style="margin-top: 10px;">
                    <button class="btn-acao-principal" data-id="botao-principal" onclick="selecionarElemento(this)">Ação Principal</button>
                    <button class="btn-cancelar" data-id="botao-secundario" onclick="selecionarElemento(this)">Secundário</button>
                </div>
            </div>
        `;
    }
}

window.onload = () => {
    carregarPaletasSalvas();
    atualizarPaletaVisual();
    mudarLayout("app");
    
    const paletaSalva = localStorage.getItem("paletaSelecionada");
    if (paletaSalva) {
        const paleta = JSON.parse(paletaSalva);
        if (paleta.cores) {
            paletaAtual = paleta.cores.slice(0, 7);
            atualizarPaletaVisual();
        }
    }
};
</script>
</body>
</html>
